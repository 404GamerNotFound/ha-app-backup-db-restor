configuration:
  log_level:
    name: "Log-Level"
    description: "Steuert die Ausfuehrlichkeit der App-Logs."
  database_path:
    name: "Datenbankpfad"
    description: "Pfad zur Home-Assistant-Datenbank im Container."
  cache_path:
    name: "Cache-Pfad"
    description: "Beschreibbarer Pfad fuer Quell-Cache, Upload-Zwischenspeicher und temporaere Extraktionen. Fuer USB/externe Speicher z. B. einen Ordner unter /media oder /share verwenden."
  config_backup_path:
    name: "Konfig-Backup-Pfad"
    description: "Beschreibbarer Pfad fuer selektive Home-Assistant-Konfigurationsbackups. Fuer USB/externe Speicher z. B. einen Ordner unter /media oder /share verwenden."
  max_upload_mb:
    name: "Maximale Uploadgroesse"
    description: "Maximale Dateigroesse fuer DB- oder Backup-Uploads in MB."
  create_current_db_backup:
    name: "Aktuelle DB sichern"
    description: "Erstellt vor einem Schreibimport eine SQLite-Sicherung der aktuellen Datenbank."
