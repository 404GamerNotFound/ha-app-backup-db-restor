configuration:
  log_level:
    name: "Log level"
    description: "Controls how verbose the app logs are."
  database_path:
    name: "Database path"
    description: "Path to the Home Assistant database inside the container."
  cache_path:
    name: "Cache path"
    description: "Writable path for source cache, upload staging, and temporary extractions. For USB or external storage, use a folder below /media or /share."
  config_backup_path:
    name: "Config backup path"
    description: "Writable path for selective Home Assistant config backups. For USB or external storage, use a folder below /media or /share."
  max_upload_mb:
    name: "Maximum upload size"
    description: "Maximum file size for database or backup uploads in MB."
  create_current_db_backup:
    name: "Back up current DB"
    description: "Creates a SQLite backup of the current database before a write import."
